<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบลงชื่อตีแบดก๊วนป๊อกแป๊ก</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css">
<style>
:root{
  --color-background-primary:#ffffff;
  --color-background-secondary:#F5F4ED;
  --color-background-tertiary:#EEEDE5;
  --color-background-danger:#FDEBEB;
  --color-background-success:#E1F5EE;
  --color-background-warning:#FAEEDA;
  --color-background-info:#E6F1FB;
  --color-text-primary:#1A1A1A;
  --color-text-secondary:#5F5E5A;
  --color-text-tertiary:#888780;
  --color-text-danger:#A32D2D;
  --color-text-success:#0F6E56;
  --color-text-warning:#854F0B;
  --color-text-info:#0C447C;
  --color-border-tertiary:rgba(0,0,0,0.08);
  --color-border-secondary:rgba(0,0,0,0.15);
  --color-border-primary:rgba(0,0,0,0.25);
  --color-border-danger:rgba(163,45,45,0.3);
  --color-border-info:rgba(12,68,124,0.3);
  --border-radius-md:8px;
  --border-radius-lg:12px;
  --font-sans:-apple-system,BlinkMacSystemFont,"Segoe UI","Sukhumvit Set","IBM Plex Sans Thai",Roboto,sans-serif;
}
@media (prefers-color-scheme: dark){
  :root{
    --color-background-primary:#1F1E1B;
    --color-background-secondary:#2A2926;
    --color-background-tertiary:#1A1917;
    --color-background-danger:#3A1818;
    --color-background-success:#0E2A22;
    --color-background-warning:#3A2A10;
    --color-background-info:#0F2540;
    --color-text-primary:#F2F1EB;
    --color-text-secondary:#B4B2A9;
    --color-text-tertiary:#888780;
    --color-text-danger:#F09595;
    --color-text-success:#5DCAA5;
    --color-text-warning:#FAC775;
    --color-text-info:#85B7EB;
    --color-border-tertiary:rgba(255,255,255,0.08);
    --color-border-secondary:rgba(255,255,255,0.15);
    --color-border-primary:rgba(255,255,255,0.25);
    --color-border-danger:rgba(240,149,149,0.3);
    --color-border-info:rgba(133,183,235,0.3);
  }
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:var(--color-background-tertiary);color:var(--color-text-primary);min-height:100vh;line-height:1.5}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
.bd-app{max-width:760px;margin:0 auto;padding:1.5rem 1rem}
.bd-hero{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem 1.5rem;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.bd-brand{display:flex;align-items:center;gap:14px}
.bd-brand-icon{width:44px;height:44px;border-radius:var(--border-radius-md);background:#E1F5EE;color:#0F6E56;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.bd-brand-title{font-size:18px;font-weight:500;line-height:1.2;margin:0}
.bd-brand-sub{font-size:13px;color:var(--color-text-secondary);margin-top:2px}
.bd-hero-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.bd-sync{font-size:12px;color:var(--color-text-tertiary);display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:var(--color-background-secondary);border-radius:20px}
.bd-sync.ok{color:var(--color-text-success)}
.bd-sync.err{color:var(--color-text-danger)}
.bd-badge{font-size:12px;padding:5px 12px;border-radius:20px;font-weight:500;display:inline-flex;align-items:center;gap:5px}
.bd-badge-admin{background:var(--color-background-warning);color:var(--color-text-warning)}
.bd-badge-user{background:#E1F5EE;color:#0F6E56}
.bd-btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 14px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);font-size:13px;cursor:pointer;font-family:var(--font-sans);transition:all .15s;font-weight:400}
.bd-btn:hover{background:var(--color-background-secondary);border-color:var(--color-border-primary)}
.bd-btn:active{transform:scale(0.98)}
.bd-btn:disabled{opacity:0.5;cursor:not-allowed}
.bd-btn-primary{background:#1D9E75;border-color:#1D9E75;color:#fff}
.bd-btn-primary:hover{background:#0F6E56;border-color:#0F6E56;color:#fff}
.bd-btn-danger{background:transparent;border-color:var(--color-border-danger);color:var(--color-text-danger)}
.bd-btn-danger:hover{background:var(--color-background-danger)}
.bd-btn-sm{padding:5px 11px;font-size:12px}
.bd-btn-icon{padding:5px 8px;font-size:13px}
.bd-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:1rem}
.bd-stat{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:0.875rem 1rem}
.bd-stat-label{font-size:12px;color:var(--color-text-secondary);display:flex;align-items:center;gap:5px;margin-bottom:4px}
.bd-stat-val{font-size:22px;font-weight:500;line-height:1.1}
.bd-tabs{display:flex;gap:6px;margin-bottom:1rem;align-items:center;flex-wrap:wrap}
.bd-tab{padding:8px 16px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);color:var(--color-text-secondary);font-size:13px;cursor:pointer;font-family:var(--font-sans);display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.bd-tab:hover{background:var(--color-background-secondary)}
.bd-tab.active{background:#0F6E56;border-color:#0F6E56;color:#fff}
.bd-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem 1.5rem;margin-bottom:1rem}
.bd-card-title{font-size:15px;font-weight:500;margin:0 0 1rem;display:flex;align-items:center;gap:8px}
.bd-card-title i{font-size:18px;color:#1D9E75}
.bd-input,.bd-select{width:100%;padding:9px 12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-size:14px;font-family:var(--font-sans);transition:border-color .15s}
.bd-input:focus,.bd-select:focus{outline:none;border-color:#1D9E75;box-shadow:0 0 0 3px rgba(29,158,117,0.15)}
.bd-input-num{width:72px;text-align:center;padding:6px 8px}
@keyframes bd-shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.bd-input-shake{animation:bd-shake .35s ease}
.bd-input-warn{border-color:#A32D2D !important;box-shadow:0 0 0 3px rgba(163,45,45,0.15) !important}
.bd-label{font-size:12px;color:var(--color-text-secondary);display:block;margin-bottom:5px;font-weight:500}
.bd-grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1rem}
.bd-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:1rem}
.bd-day-group{margin-bottom:1.25rem}
.bd-day-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:0.5px solid var(--color-border-tertiary);flex-wrap:wrap}
.bd-day-date{font-size:14px;font-weight:500}
.bd-day-rel{font-size:12px;color:var(--color-text-tertiary);background:var(--color-background-secondary);padding:2px 9px;border-radius:20px}
.bd-day-rel.today{background:#E1F5EE;color:#0F6E56}
.bd-day-rel.tomorrow{background:var(--color-background-info);color:var(--color-text-info)}
.bd-slot{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:0.875rem 1rem;margin-bottom:8px}
.bd-slot-header{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.bd-slot-info{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.bd-slot-period{display:inline-flex;align-items:center;gap:6px;font-weight:500;font-size:14px}
.bd-slot-period i{font-size:18px}
.bd-slot-period.morning i{color:#BA7517}
.bd-slot-period.evening i{color:#D85A30}
.bd-slot-period.night i{color:#534AB7}
.bd-slot-time{font-size:12px;color:var(--color-text-secondary);background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);padding:3px 9px;border-radius:20px;font-variant-numeric:tabular-nums}
.bd-slot-count{font-size:12px;color:var(--color-text-secondary);display:inline-flex;align-items:center;gap:4px}
/* limit bar */
.bd-limit-bar-wrap{margin:6px 0 8px;display:flex;align-items:center;gap:8px}
.bd-limit-bar-track{flex:1;height:6px;border-radius:3px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);overflow:hidden}
.bd-limit-bar-fill{height:100%;border-radius:3px;background:#1D9E75;transition:width .3s}
.bd-limit-bar-fill.full{background:#A32D2D}
.bd-limit-bar-fill.warn{background:#BA7517}
.bd-limit-label{font-size:12px;color:var(--color-text-secondary);white-space:nowrap;flex-shrink:0}
.bd-limit-label.full{color:var(--color-text-danger)}
/* waitlist section */
.bd-waitlist-section{margin-top:10px;padding-top:10px;border-top:0.5px dashed var(--color-border-secondary)}
.bd-waitlist-header{font-size:12px;color:var(--color-text-warning);font-weight:500;display:flex;align-items:center;gap:5px;margin-bottom:6px}
.bd-signups{display:flex;flex-wrap:wrap;gap:6px;min-height:28px;align-items:center}
.bd-chip{display:inline-flex;align-items:center;gap:6px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:20px;padding:4px 10px 4px 6px;font-size:13px}
.bd-chip-avatar{width:20px;height:20px;border-radius:50%;background:#E1F5EE;color:#0F6E56;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0}
.bd-chip-me{background:#E1F5EE;border-color:#5DCAA5;color:#0F6E56}
.bd-chip-me .bd-chip-avatar{background:#1D9E75;color:#fff}
.bd-chip-wait{background:var(--color-background-warning);border-color:rgba(133,79,11,0.25);color:var(--color-text-warning)}
.bd-chip-wait .bd-chip-avatar{background:#BA7517;color:#fff}
.bd-chip-wait-me{background:var(--color-background-warning);border-color:rgba(133,79,11,0.4);color:var(--color-text-warning)}
.bd-chip-wait-me .bd-chip-avatar{background:#854F0B;color:#fff}
.bd-chip-num{font-size:10px;opacity:.7;margin-left:1px}
.bd-chip-del{cursor:pointer;color:var(--color-text-tertiary);font-size:14px;line-height:1;padding:0 2px;margin-left:2px;border-radius:50%;width:16px;height:16px;display:inline-flex;align-items:center;justify-content:center}
.bd-chip-del:hover{color:var(--color-text-danger);background:var(--color-background-danger)}
.bd-empty{font-size:13px;color:var(--color-text-tertiary);font-style:italic}
.bd-empty-state{text-align:center;padding:2.5rem 1rem;color:var(--color-text-tertiary)}
.bd-empty-state i{font-size:40px;display:block;margin-bottom:.75rem;color:var(--color-text-tertiary)}
.bd-empty-state p{margin:4px 0}
.bd-modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem}
.bd-modal{background:var(--color-background-primary);border-radius:var(--border-radius-lg);padding:1.5rem;width:min(400px,100%);border:0.5px solid var(--color-border-secondary)}
.bd-modal-title{font-size:16px;font-weight:500;margin:0 0 1rem;display:flex;align-items:center;gap:8px}
.bd-modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:1.25rem}
.bd-past{opacity:0.55}
.bd-past-badge{font-size:11px;background:var(--color-background-tertiary);color:var(--color-text-tertiary);padding:2px 8px;border-radius:20px}
.bd-alert{padding:10px 14px;border-radius:var(--border-radius-md);font-size:13px;margin-bottom:.75rem;display:flex;align-items:center;gap:8px;border:0.5px solid}
.bd-alert-success{background:#E1F5EE;color:#0F6E56;border-color:#5DCAA5}
.bd-alert-error{background:var(--color-background-danger);color:var(--color-text-danger);border-color:var(--color-border-danger)}
.bd-divider{border:none;border-top:0.5px solid var(--color-border-tertiary);margin:.75rem 0}
.bd-add-form{display:flex;gap:8px;align-items:stretch}
.bd-add-form input{flex:1}
.bd-limit-control{display:flex;align-items:center;gap:6px}
.bd-limit-control span{font-size:13px;font-weight:500;min-width:28px;text-align:center}
.bd-spin{display:inline-block;animation:bd-spin .8s linear infinite}
@keyframes bd-spin{to{transform:rotate(360deg)}}
.bd-loader{text-align:center;padding:3rem 0;color:var(--color-text-secondary)}
.bd-welcome{text-align:center;padding:1rem 0}
.bd-welcome-icon{width:64px;height:64px;border-radius:50%;background:#E1F5EE;color:#0F6E56;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 1rem}
.bd-welcome h3{font-size:17px;font-weight:500;margin:0 0 6px}
.bd-welcome p{font-size:13px;color:var(--color-text-secondary);margin:0 0 1.25rem}
.bd-name-form{display:flex;gap:8px;max-width:380px;margin:0 auto}
.bd-info-banner{font-size:13px;background:var(--color-background-info);color:var(--color-text-info);border:0.5px solid var(--color-border-info);border-radius:var(--border-radius-md);padding:9px 14px;margin-bottom:1rem;display:flex;align-items:center;gap:8px}
.bd-setup-warning{background:var(--color-background-warning);color:var(--color-text-warning);border:0.5px solid rgba(133,79,11,0.3);border-radius:var(--border-radius-md);padding:1rem 1.25rem;margin-bottom:1rem;font-size:13px;line-height:1.6}
.bd-setup-warning strong{font-weight:500;display:block;margin-bottom:6px;font-size:14px}
.bd-setup-warning code{background:rgba(0,0,0,0.06);padding:1px 6px;border-radius:4px;font-family:monospace;font-size:12px}
.bd-footer{text-align:center;font-size:12px;color:var(--color-text-tertiary);padding:1.5rem 0 .5rem}
.bd-section-label{font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:6px;display:flex;align-items:center;gap:5px}
@media (max-width:520px){
.bd-app{padding:1rem .75rem}
.bd-hero{padding:1rem}
.bd-card{padding:1rem}
.bd-grid2{grid-template-columns:1fr}
.bd-grid3{grid-template-columns:1fr}
}
</style>

<body>
<h1 class="sr-only">ระบบลงชื่อตีแบดก๊วนป๊อกแป๊ก</h1>

<div class="bd-app" id="bd-root">
  <div class="bd-loader"><i class="ti ti-loader-2 bd-spin" style="font-size:32px;display:block;margin-bottom:.5rem"></i>กำลังเชื่อมต่อ...</div>
</div>

<div class="bd-footer">⚡ Powered By · Poom</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, onSnapshot, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDYrliwQj9jmsbbS63ffpdIGPTDhJEGTAI",
  authDomain: "badminton-e2f4d.firebaseapp.com",
  projectId: "badminton-e2f4d",
  storageBucket: "badminton-e2f4d.firebasestorage.app",
  messagingSenderId: "289792798899",
  appId: "1:289792798899:web:faf8417a0eede18f2640c6",
  measurementId: "G-Q3EFXKVWKD"
};

const ADMIN_PASSWORD = "badmin2025";
const USER_KEY = "badminton_user_v1";
const DOC_PATH = ["app","data"];

const SLOT_PERIODS = [
  {id:"morning",label:"รอบเช้า",icon:"ti-sun",time:"09:00–12:00",cls:"morning",defaultLimit:26},
  {id:"evening",label:"รอบเย็น",icon:"ti-sunset-2",time:"19:00–23:00",cls:"evening",defaultLimit:26},
  {id:"night",label:"รอบกลางคืน",icon:"ti-moon-stars",time:"20:00–22:00",cls:"night",defaultLimit:20}
];

let state = {
  view:"user",
  currentUser: localStorage.getItem(USER_KEY) || "",
  isAdmin:false,
  slots:[],
  alert:null,
  modal:null,
  loaded:false,
  syncStatus:"connecting",
  configError:false,
  _nameWarn:false
};

let db = null;
let docRef = null;

if(firebaseConfig.apiKey === "YOUR_API_KEY"){
  state.configError = true;
  state.loaded = true;
  render();
} else {
  try {
    const app = initializeApp(firebaseConfig);
    db = getFirestore(app);
    docRef = doc(db, DOC_PATH[0], DOC_PATH[1]);
    onSnapshot(docRef, (snap)=>{
      if(snap.exists()){
        const data = snap.data();
        state.slots = data.slots || [];
      } else {
        state.slots = [];
      }
      state.loaded = true;
      state.syncStatus = "online";
      render();
    }, (err)=>{
      console.error("Firestore error:", err);
      state.syncStatus = "error";
      state.loaded = true;
      render();
      showAlert("เชื่อมต่อ Firebase ไม่ได้","error");
    });
  } catch(e){
    console.error("Firebase init error:", e);
    state.configError = true;
    state.loaded = true;
    render();
  }
}

async function updateSlots(mutator){
  if(!docRef) return;
  state.syncStatus = "saving"; render();
  try {
    await runTransaction(db, async (tx)=>{
      const snap = await tx.get(docRef);
      const current = snap.exists() ? (snap.data().slots || []) : [];
      const next = mutator(JSON.parse(JSON.stringify(current)));
      tx.set(docRef, {slots: next, updatedAt: Date.now()});
    });
    state.syncStatus = "online";
  } catch(e){
    console.error("Save error:", e);
    state.syncStatus = "error";
    showAlert("บันทึกไม่สำเร็จ ลองใหม่อีกครั้ง","error");
  }
  render();
}

function getSlotLimit(slot){
  if(typeof slot.limit === 'number') return slot.limit;
  const period = SLOT_PERIODS.find(p=>p.id===slot.periodId);
  return period ? period.defaultLimit : 20;
}

function isPast(dateStr, periodId){
  const d = new Date(dateStr);
  const period = SLOT_PERIODS.find(p=>p.id===periodId);
  const endH = parseInt(period.time.split("–")[1].split(":")[0]);
  return new Date() > new Date(d.getFullYear(),d.getMonth(),d.getDate(),endH,0,0);
}

function formatDate(str){
  const d = new Date(str+"T00:00:00");
  const days=["อาทิตย์","จันทร์","อังคาร","พุธ","พฤหัส","ศุกร์","เสาร์"];
  return `${days[d.getDay()]} ${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()+543}`;
}

function getRelativeDay(str){
  const d = new Date(str+"T00:00:00");
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.round((d-today)/(1000*60*60*24));
  if(diff===0) return {text:"วันนี้",cls:"today"};
  if(diff===1) return {text:"พรุ่งนี้",cls:"tomorrow"};
  if(diff>1 && diff<=7) return {text:`อีก ${diff} วัน`,cls:""};
  return null;
}

function getInitial(name){
  return name.trim().charAt(0).toUpperCase();
}

function showAlert(msg,type){
  state.alert={msg,type:type||"success"}; render();
  setTimeout(()=>{state.alert=null;render();},3500);
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function render(){
  const root = document.getElementById("bd-root");
  if(!root) return;

  if(state.configError){
    root.innerHTML = renderSetupGuide();
    return;
  }

  if(!state.loaded){
    root.innerHTML = `<div class="bd-loader"><i class="ti ti-loader-2 bd-spin" style="font-size:32px;display:block;margin-bottom:.5rem"></i>กำลังเชื่อมต่อ...</div>`;
    return;
  }

  let html = `<div class="bd-hero">
    <div class="bd-brand">
      <div class="bd-brand-icon"><i class="ti ti-ball-tennis" aria-hidden="true"></i></div>
      <div>
        <div class="bd-brand-title">ระบบลงชื่อตีแบดก๊วนป๊อกแป๊ก</div>
        <div class="bd-brand-sub">มาตีแบดกันค่ะ สนามนนท์สปอร์ต</div>
        <div class="bd-brand-sub">#ห้ามเสิร์ฟยิง,ห้ามยืนชิดเส้น/แย็บ<br>
                                  #งดสอน,เหวี่ยง,วีน,ตึง<br>
                                  #อยากได้แบบไหนเดินมาบอกผู้จัดได้เลย</div>
        <div class="bd-brand-sub">แผนที่สนาม : https://maps.app.goo.gl/S3zxmozrGKT4SY2z8</div>
      </div>
    </div>
    <div class="bd-hero-right">
      ${renderSyncIndicator()}
      ${state.currentUser?`<span class="bd-badge bd-badge-user"><i class="ti ti-user" aria-hidden="true"></i>${escapeHtml(state.currentUser)}</span>`:''}
      ${state.isAdmin?`<span class="bd-badge bd-badge-admin"><i class="ti ti-shield-lock" aria-hidden="true"></i>Admin</span>`:''}
      ${(state.isAdmin||state.currentUser)?`<button class="bd-btn bd-btn-sm" onclick="bdLogout()"><i class="ti ti-logout"></i>ออกจากระบบ</button>`:''}
    </div>
  </div>`;

  if(state.currentUser || state.isAdmin){
    const activeSlots = state.slots.filter(s=>!isPast(s.date,s.periodId));
    const totalSignups = activeSlots.reduce((sum,s)=>sum+s.signups.length,0);
    const totalWaiting = activeSlots.reduce((sum,s)=>sum+(s.waitlist||[]).length,0);
    const mySignups = state.currentUser ? activeSlots.filter(s=>s.signups.includes(state.currentUser)).length : 0;
    const myWaiting = state.currentUser ? activeSlots.filter(s=>(s.waitlist||[]).includes(state.currentUser)).length : 0;
    html += `<div class="bd-stats">
      <div class="bd-stat">
        <div class="bd-stat-label"><i class="ti ti-calendar-event"></i>รอบที่เปิด</div>
        <div class="bd-stat-val">${activeSlots.length}</div>
      </div>
      <div class="bd-stat">
        <div class="bd-stat-label"><i class="ti ti-users"></i>ผู้ลงชื่อ</div>
        <div class="bd-stat-val">${totalSignups}</div>
      </div>
      ${totalWaiting>0?`<div class="bd-stat">
        <div class="bd-stat-label"><i class="ti ti-clock-hour-3"></i>รายชื่อสำรอง</div>
        <div class="bd-stat-val">${totalWaiting}</div>
      </div>`:''}
      ${state.currentUser?`<div class="bd-stat">
        <div class="bd-stat-label"><i class="ti ti-bookmark"></i>ของฉัน</div>
        <div class="bd-stat-val">${mySignups}${myWaiting>0?` <span style="font-size:13px;color:var(--color-text-warning);font-weight:400">+${myWaiting}สำรอง</span>`:''}</div>
      </div>`:''}
    </div>`;
  }

  if(state.alert){
    const icon = state.alert.type==='success'?'ti-circle-check':'ti-alert-circle';
    html += `<div class="bd-alert bd-alert-${state.alert.type}"><i class="ti ${icon}"></i>${escapeHtml(state.alert.msg)}</div>`;
  }

  html += `<div class="bd-tabs">
    <button class="bd-tab ${state.view==='user'?'active':''}" onclick="bdSetView('user')"><i class="ti ti-calendar"></i>ดูรอบ / ลงชื่อ</button>
    ${state.isAdmin
      ? `<button class="bd-tab ${state.view==='admin'?'active':''}" onclick="bdSetView('admin')"><i class="ti ti-settings"></i>จัดการ</button>`
      : `<button class="bd-tab" onclick="bdOpenAdminLogin()"><i class="ti ti-lock"></i>Admin</button>`}
  </div>`;

  html += state.view==="user" ? renderUserView() : (state.isAdmin ? renderAdminView() : '');
  if(state.modal) html += renderModal();

  root.innerHTML = html;
}

function renderSyncIndicator(){
  if(state.syncStatus==="saving") return `<span class="bd-sync"><i class="ti ti-refresh bd-spin"></i>กำลังบันทึก</span>`;
  if(state.syncStatus==="error") return `<span class="bd-sync err"><i class="ti ti-cloud-off"></i>ออฟไลน์</span>`;
  return `<span class="bd-sync ok"><i class="ti ti-cloud-check"></i>ซิงค์แล้ว</span>`;
}

function renderLimitBar(signups, limit){
  const pct = Math.min(100, Math.round((signups/limit)*100));
  const full = signups >= limit;
  const warn = pct >= 80;
  const fillCls = full ? 'full' : warn ? 'warn' : '';
  return `<div class="bd-limit-bar-wrap">
    <div class="bd-limit-bar-track"><div class="bd-limit-bar-fill ${fillCls}" style="width:${pct}%"></div></div>
    <span class="bd-limit-label ${full?'full':''}">${signups}/${limit}</span>
  </div>`;
}

  if(!state.currentUser){
    return `<div class="bd-card">

        <div class="bd-welcome-icon"><i class="ti ti-user-plus" aria-hidden="true"></i></div>

// ───── Global handlers ─────
window.bdSetView = v => {
  if(v === 'user' && !state.currentUser && !state.isAdmin){
    state._nameWarn = true;
    render();
    setTimeout(()=>{
      const inp = document.getElementById("bd-nameInput");
      if(inp){ inp.focus(); inp.scrollIntoView({behavior:"smooth",block:"center"}); }
      setTimeout(()=>{ const inp=document.getElementById("bd-nameInput"); if(inp) inp.classList.remove("bd-input-shake"); },400);
    },50);
    return;
  }
  state._nameWarn = false;
  state.view = v;
  render();
};

window.bdOpenAdminLogin = () => { state.modal={type:"adminLogin",error:null}; render(); setTimeout(()=>{const i=document.getElementById("bd-pwInput");if(i)i.focus();},50); };
window.bdCloseModal = () => { state.modal=null; render(); };
window.bdLogout = () => {
  state.currentUser=""; state.isAdmin=false; state.view="user"; state._nameWarn=false;
  try { localStorage.removeItem(USER_KEY); } catch(e){}
  render();
};

window.bdDoAdminLogin = () => {
  const pw = document.getElementById("bd-pwInput");
  if(!pw) return;
  if(pw.value===ADMIN_PASSWORD){
    state.isAdmin=true; state.modal=null; state.view="admin"; render();
    showAlert("เข้าสู่ระบบ Admin สำเร็จ");
  } else {
    state.modal.error="รหัสผ่านไม่ถูกต้อง"; render();
    setTimeout(()=>{const i=document.getElementById("bd-pwInput");if(i){i.focus();i.select();}},50);
  }
};

window.bdSetUser = () => {
  const inp = document.getElementById("bd-nameInput");
  if(!inp||!inp.value.trim()) return;
  state.currentUser=inp.value.trim();
  state._nameWarn=false;
  try { localStorage.setItem(USER_KEY, state.currentUser); } catch(e){}
  render();
};

window.bdSignUp = async (slotId) => {
  if(!state.currentUser) return;
  const user = state.currentUser;
  let msg = '';
  await updateSlots(slots => {
    const slot = slots.find(s=>s.id===slotId);
    if(!slot) return slots;
    if(!slot.waitlist) slot.waitlist = [];
    const limit = getSlotLimit(slot);
    if(slot.signups.includes(user)||slot.waitlist.includes(user)){
      showAlert("คุณลงชื่อไว้แล้ว","error");
      return slots;
    }
    if(slot.signups.length < limit){
      slot.signups.push(user);
      msg = `ลงชื่อ ${SLOT_PERIODS.find(p=>p.id===slot.periodId).label} สำเร็จ`;
    } else {
      slot.waitlist.push(user);
      msg = `รอบเต็ม — เพิ่มคุณเป็นสำรองลำดับที่ ${slot.waitlist.length}`;
    }
    return slots;
  });
  if(msg) showAlert(msg);
};

window.bdRemoveSelf = async (slotId) => {
  const user = state.currentUser;
  await updateSlots(slots => {
    const slot = slots.find(s=>s.id===slotId);
    if(!slot) return slots;
    slot.signups = slot.signups.filter(u=>u!==user);
    if(!slot.waitlist) slot.waitlist = [];
    // promote first waitlist person
    if(slot.waitlist.length > 0){
      const promoted = slot.waitlist.shift();
      slot.signups.push(promoted);
    }
    return slots;
  });
  showAlert("ถอนชื่อเรียบร้อย");
};

window.bdRemoveFromWaitlist = async (slotId) => {
  const user = state.currentUser;
  await updateSlots(slots => {
    const slot = slots.find(s=>s.id===slotId);
    if(!slot) return slots;
    if(!slot.waitlist) slot.waitlist = [];
    slot.waitlist = slot.waitlist.filter(u=>u!==user);
    return slots;
  });
  showAlert("ถอนออกจากรายชื่อสำรองแล้ว");
};

window.bdAdminAddSlot = async () => {
  const d=document.getElementById("bd-adminDate");
  const p=document.getElementById("bd-adminPeriod");
  const lEl=document.getElementById("bd-adminLimit");
  if(!d||!p||!d.value){ showAlert("กรุณาเลือกวันที่","error"); return; }
  const date=d.value, periodId=p.value;
  const period=SLOT_PERIODS.find(x=>x.id===periodId);
  const limitVal = lEl&&lEl.value.trim() ? parseInt(lEl.value) : period.defaultLimit;
  await updateSlots(slots => {
    if(slots.find(s=>s.date===date&&s.periodId===periodId)){
      showAlert("มีรอบนี้อยู่แล้ว","error");
      return slots;
    }
    slots.push({id:`${date}_${periodId}`,date,periodId,signups:[],waitlist:[],limit:limitVal});
    showAlert(`เพิ่มรอบ ${formatDate(date)} ${period.label} (สูงสุด ${limitVal} คน)`);
    return slots;
  });
  if(lEl) lEl.value='';
};

window.bdAdminDeleteSlot = async (slotId) => {
  if(!confirm("ยืนยันการลบรอบนี้?")) return;
  await updateSlots(slots => slots.filter(s=>s.id!==slotId));
  showAlert("ลบรอบเรียบร้อย");
};

window.bdAdminChangeLimit = async (slotId, delta) => {
  await updateSlots(slots => {
    const slot = slots.find(s=>s.id===slotId);
    if(!slot) return slots;
    if(!slot.waitlist) slot.waitlist = [];
    const oldLimit = getSlotLimit(slot);
    const newLimit = Math.max(1, oldLimit + delta);
    slot.limit = newLimit;
    // If limit increased, promote waitlist members to fill spots
    while(slot.signups.length < slot.limit && slot.waitlist.length > 0){
      slot.signups.push(slot.waitlist.shift());
    }
    return slots;
  });
};

window.bdAdminRemovePerson = async (slotId, encodedName, listType) => {
  const name=decodeURIComponent(encodedName);
  await updateSlots(slots => {
    const slot=slots.find(s=>s.id===slotId);
    if(!slot) return slots;
    if(!slot.waitlist) slot.waitlist=[];
    if(listType==='waitlist'){
      slot.waitlist=slot.waitlist.filter(u=>u!==name);
    } else {
      slot.signups=slot.signups.filter(u=>u!==name);
      // promote from waitlist
      if(slot.waitlist.length>0){
        const promoted=slot.waitlist.shift();
        slot.signups.push(promoted);
      }
    }
    return slots;
  });
};

window.bdAdminAddPerson = async (slotId) => {
  const inp=document.getElementById(`bd-addName_${slotId}`);
  if(!inp||!inp.value.trim()) return;
  const name=inp.value.trim();
  await updateSlots(slots => {
    const slot=slots.find(s=>s.id===slotId);
    if(!slot) return slots;
    if(!slot.waitlist) slot.waitlist=[];
    const limit=getSlotLimit(slot);
    if(slot.signups.includes(name)||slot.waitlist.includes(name)){
      showAlert(`${name} มีชื่ออยู่แล้ว`,"error");
      return slots;
    }
    if(slot.signups.length < limit){
      slot.signups.push(name);
      showAlert(`เพิ่ม ${name} เข้ารายชื่อแล้ว`);
    } else {
      slot.waitlist.push(name);
      showAlert(`เพิ่ม ${name} เป็นสำรองลำดับที่ ${slot.waitlist.length}`);
    }
    return slots;
  });
  if(inp) inp.value="";
};
